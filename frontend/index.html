gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all form-input"
                        required>
                  <option value="">Selecciona</option>
                  <option value="sedentary">Sedentario</option>
                  <option value="light">Ligera</option>
                  <option value="moderate">Moderada</option>
                  <option value="active">Activa</option>
                  <option value="very_active">Muy activa</option>
                </select>
              </div>
            </div>
            
            <div>
              <label for="reg-goal" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                Objetivo
              </label>
              <select id="reg-goal" 
                      class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all form-input"
                      required>
                <option value="">Selecciona</option>
                <option value="lose">Perder peso</option>
                <option value="maintain">Mantener peso</option>
                <option value="gain">Ganar masa muscular</option>
              </select>
            </div>
            
            <button type="submit" 
                    class="w-full gradient-premium text-white py-3 rounded-xl font-bold shadow-lg btn-premium mt-2">
              Crear cuenta
            </button>
          </div>
        </form>
        
        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
          ¿Ya tienes cuenta? 
          <button onclick="hideModal('register'); showModal('login');" 
                  class="text-primary-600 dark:text-primary-400 font-bold hover:underline">
            Inicia sesión aquí
          </button>
        </p>
      </div>
    </div>
  </div>

  <!-- Edit Profile / Weight Modal -->
  <div id="edit-modal" class="fixed inset-0 z-[100] hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="edit-title">
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm" onclick="hideModal('edit')"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
      <div class="glass-card rounded-3xl shadow-2xl max-w-md w-full p-6 animate-scale-in">
        <div class="flex justify-between items-center mb-6">
          <h3 id="edit-title" class="text-xl font-black text-gray-900 dark:text-white">Registrar peso</h3>
          <button onclick="hideModal('edit')" class="text-gray-500 hover:text-gray-900 dark:hover:text-white text-2xl" aria-label="Cerrar">
            ×
          </button>
        </div>
        
        <div class="space-y-4">
          <div>
            <label for="weight-input" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Peso actual (kg)
            </label>
            <input type="number" 
                   id="weight-input" 
                   class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all form-input"
                   placeholder="Ej: 72.5"
                   min="30"
                   max="300"
                   step="0.1"
                   required>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">
              Registra tu peso para actualizar tu progreso y gráficos.
            </p>
          </div>
          
          <button onclick="registerWeight()" 
                  class="w-full gradient-success text-white py-3 rounded-xl font-bold shadow-lg btn-premium">
            Guardar peso
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Shopping List Modal -->
  <div id="shopping-modal" class="fixed inset-0 z-[100] hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="shopping-title">
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm" onclick="hideModal('shopping')"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
      <div class="glass-card rounded-3xl shadow-2xl max-w-2xl w-full p-6 animate-scale-in max-h-[90vh] overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-6">
          <h3 id="shopping-title" class="text-xl font-black text-gray-900 dark:text-white">🛒 Lista de compras</h3>
          <button onclick="hideModal('shopping')" class="text-gray-500 hover:text-gray-900 dark:hover:text-white text-2xl" aria-label="Cerrar">
            ×
          </button>
        </div>
        
        <div id="shopping-list-content" class="flex-1 overflow-y-auto pr-2">
          <div class="text-center py-8 text-gray-500 dark:text-gray-400">
            <div class="text-4xl mb-4">🛒</div>
            <p>Cargando lista de compras...</p>
          </div>
        </div>
        
        <div class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700">
          <div class="flex justify-between items-center">
            <button onclick="clearShoppingList()" 
                    class="text-sm text-red-500 hover:text-red-700 dark:hover:text-red-400 font-bold">
              Limpiar lista
            </button>
            <button onclick="copyShoppingList()" 
                    class="gradient text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg btn-premium">
              📋 Copiar lista
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-[100] space-y-2"></div>

  <!-- JavaScript -->
  <script src="app.js"></script>
</body>
</html>
