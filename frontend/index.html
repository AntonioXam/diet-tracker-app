    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    },
                    colors: {
                        primary: {
                            50: '#faf5ff',
                            100: '#f3e8ff',
                            200: '#e9d5ff',
                            300: '#d8b4fe',
                            400: '#c084fc',
                            500: '#a855f7',
                            600: '#9333ea',
                            700: '#7e22ce',
                            800: '#6b21a8',
                            900: '#581c87'
                        },
                        accent: {

                            100: '#dbeafe',

                            600: '#2563eb'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        
        /* Lazy loading placeholder */
        .lazy-image {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .dark .glass {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            box-shadow: 0 4px 14px rgba(168, 85, 247, 0.4);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }
        
        .slide-enter {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-white to-blue-50 dark:from-gray-900 dark:via-gray-900 dark:to-gray-800 min-h-screen transition-colors duration-300">
    
    <!-- Navigation -->
    <nav class="glass sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 sm:w-12 sm:h-12 bg-gradient-to-br from-purple-500 to-blue-500 rounded-xl flex items-center justify-center text-2xl sm:text-3xl">🥗</div>
                    <div>
                        <h1 class="text-lg sm:text-2xl font-black gradient-text">Diet Tracker FIT</h1>
                    </div>
                </div>
                
                <div class="flex items-center gap-2 sm:gap-4">
                    <!-- Dark Mode Toggle -->
                    <button onclick="toggleDark()" class="touch-target w-10 h-10 sm:w-12 sm:h-12 rounded-xl glass flex items-center justify-center text-lg sm:text-xl" aria-label="Cambiar modo oscuro">
                        <span id="dark-icon">🌙</span>
                    </button>
                    
                    <!-- User Info (Dashboard only) -->
                    <div id="nav-user" class="hidden items-center gap-2 sm:gap-3">
                        <div class="w-8 h-8 sm:w-10 sm:h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-full flex items-center justify-center text-white font-bold text-sm sm:text-base" id="user-avatar">U</div>
                        <span class="font-bold text-sm sm:text-base dark:text-white hidden sm:block" id="user-name"></span>
                        <button onclick="logout()" class="touch-target text-red-500 hover:text-red-600 p-2" aria-label="Cerrar sesión">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                    
                    <!-- Auth Buttons (Landing only) -->
                    <div id="nav-auth" class="flex items-center gap-2">
                        <button onclick="showModal('login')" class="touch-target px-3 sm:px-4 py-2 font-bold rounded-xl text-sm sm:text-base text-gray-900 dark:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Entrar</button>
                        <button onclick="showModal('register')" class="btn-primary text-white px-4 sm:px-6 py-2 rounded-xl font-bold text-sm sm:text-base">Registrarse</button>
                    </div>
                    
                    <!-- Dashboard Mobile Menu Button (hidden on landing) -->
                    <button id="dashboard-menu-btn" onclick="toggleDashboardMenu()" class="touch-target sm:hidden w-10 h-10 rounded-xl glass flex items-center justify-center hidden">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
            
            <!-- Landing Page Mobile Menu (hidden by default, shown via JS when on landing) -->
            <div id="landing-mobile-menu" class="hidden sm:hidden mt-4 pb-4 border-t border-gray-200 dark:border-gray-700 pt-4">
                <div class="flex flex-col gap-2">
                    <a href="#inicio" class="touch-target px-4 py-3 rounded-xl text-gray-900 dark:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-medium">Inicio</a>
                    <a href="#features" class="touch-target px-4 py-3 rounded-xl text-gray-900 dark:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-medium">Características</a>
                    <a href="#beneficios" class="touch-target px-4 py-3 rounded-xl text-gray-900 dark:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-medium">Beneficios</a>
                    <a href="#pricing" class="touch-target px-4 py-3 rounded-xl text-gray-900 dark:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-medium">Precios</a>
                    <a href="#faq" class="touch-target px-4 py-3 rounded-xl text-gray-900 dark:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-medium">FAQ</a>
                </div>
            </div>
            
            <!-- Dashboard Mobile Menu (hidden by default) -->
            <div id="dashboard-mobile-menu" class="hidden sm:hidden mt-4 pb-4 border-t border-gray-200 dark:border-gray-700 pt-4">
                <div class="flex flex-col gap-2">
                    <a href="#" onclick="showPage('dashboard'); toggleDashboardMenu()" class="touch-target px-4 py-3 rounded-xl text-gray-900 dark:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-medium"><i class="fas fa-home mr-2"></i>Dashboard</a>
                    <a href="#" onclick="showProfile(); toggleDashboardMenu()" class="touch-target px-4 py-3 rounded-xl text-gray-900 dark:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-medium"><i class="fas fa-user mr-2"></i>Perfil</a>
                    <a href="#" onclick="showSettings(); toggleDashboardMenu()" class="touch-target px-4 py-3 rounded-xl text-gray-900 dark:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-medium"><i class="fas fa-cog mr-2"></i>Configuración</a>
                    <a href="#" onclick="logout(); toggleDashboardMenu()" class="touch-target px-4 py-3 rounded-xl text-red-500 dark:text-red-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-medium"><i class="fas fa-sign-out-alt mr-2"></i>Cerrar sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content">
        <!-- Landing Page Sections will be injected here -->
    </main>

    <!-- Dashboard Section (Hidden by default) -->
    <main id="dashboard-content" class="hidden container mx-auto px-4 py-8">
        <!-- Dashboard content will be injected here -->
    </main>

    <!-- Onboarding Flow (Hidden by default) -->
    <div id="onboarding-modal" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass-card bg-white dark:bg-gray-900 rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6 sm:p-8 relative">
            <button onclick="closeOnboarding()" class="absolute top-4 right-4 touch-target w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
            <div id="onboarding-content"></div>
        </div>
    </div>

    <!-- Food Registration Modal -->
    <div id="food-modal" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass-card bg-white dark:bg-gray-900 rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6 sm:p-8 relative">
            <button onclick="closeFoodModal()" class="absolute top-4 right-4 touch-target w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
            <div id="food-content"></div>
        </div>
    </div>

    <!-- Auth Modals -->
    <div id="auth-modals"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[150] flex flex-col gap-2"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden fixed inset-0 z-[200] bg-black/50 backdrop-blur-sm flex items-center justify-center">
        <div class="glass-card rounded-2xl p-8 text-center">
            <div class="w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="font-bold dark:text-white">Cargando...</p>
        </div>
    </div>

    <!-- Skip Link for Accessibility -->
    <a href="#main-content" class="skip-link sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:bg-purple-500 focus:text-white focus:px-4 focus:py-2 focus:rounded-xl focus:z-[300]">
        Saltar al contenido principal
    </a>

    <script src="app.js"></script>
</body>
</html>
